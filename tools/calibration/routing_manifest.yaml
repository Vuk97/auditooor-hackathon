# routing_manifest.yaml — per-task-type provider routing source-of-truth
# Updated: 2026-05-04  (ACT-14 agent-calibration-memory)
#
# Status legend:
#   route-ok       — preferred provider has TP >= 70% with n >= 5
#   do-not-route   — all providers below 70% TP; use human review
#   advisory-only  — use output for framing only, not for direct submission
#   no-data        — insufficient calibration data (n < 5); treat as advisory-only
#
# thinking_weight: fraction of budget allocated to reasoning tokens (0.0–1.0)
# budget_per_task_usd: soft cap per dispatch (informational only)

