# fork-replay-recipe.yaml — per-protocol fork-replay recipes for fork-replay.py
#
# Each entry is used by:
#   python3 tools/fork-replay.py --protocol <name> [--network <net>] [--block N]
#
# RPC URLs are resolved from env vars via ${ENV_VAR} expansion.
# Operator must export the relevant env var before running live mode.
#
# M14-trap: default_overrides reference stubs in detectors/_fixtures/replay_harness/
# Each stub declares its Production faithfulness scope at the top.

# ─── 1. Optimism / Base ───────────────────────────────────────────────────────
- protocol: optimism
  network: mainnet
  rpc: ${ALCHEMY_MAINNET_RPC_URL}
  default_block: 21500000
  contracts:
    OptimismPortal: "0xbEb5Fc579115071764c7423A4f12eDde41f106Ed"
    DisputeGameFactory: "0xe5965Ab5962eDc7477C8520243A95517CD252fA9"
    L2OutputOracle: "0xdfe97868233d1aa22e815a266982f2cf17685a27"
  default_overrides:
    - OptimismPortal: "detectors/_fixtures/replay_harness/OptimismPortalStub.sol"
  notes: >
    Used for FN2-class withdrawal/guardian attacks.
    OptimismPortalStub covers 6 of 7 production checks; MerkleTrie inclusion
    proof is stub-replaced by registeredWithdrawals map.

