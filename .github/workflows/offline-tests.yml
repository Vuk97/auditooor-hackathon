name: Offline Tests

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run docs/reference checks
        run: make docs-check make-new-engagement-test
      - name: Run curated offline regression suite
        run: |
          python -m unittest \
            tools.tests.test_docs_truth_sweep \
            tools.tests.test_automation_closure \
            tools.tests.test_base_scan_preflight \
            tools.tests.test_cross_link_validator \
            tools.tests.test_zkbugs_readiness \
            -v
      - name: Run Solidity smoke tooling tests
        run: make smoke-tooling-test
      - name: Run memory/control-plane suite
        run: make memory-control-plane-test
