name: Offline Tests

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run docs/reference checks
        run: make docs-check make-new-engagement-test
      - name: Run executable judge walkthrough
        run: make judge-demo
      - name: Run public judge regression suite
        run: make judge-check
