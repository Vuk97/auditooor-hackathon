# Sherlock platform severity rubric (canonical reference)
#
# Sources:
#   - https://docs.sherlock.xyz/audits/judging/judging
#   - https://docs.sherlock.xyz/audits/judging/criteria
#
# Schema: auditooor.severity_rubric.v1
platform: sherlock
schema_version: auditooor.severity_rubric.v1
source_docs:
  - "https://docs.sherlock.xyz/audits/judging/judging"
  - "https://docs.sherlock.xyz/audits/judging/criteria"
selector_modes:
  - contest-listed-asset   # Sherlock contests fix the scope at the contest header
poc_framing:
  preferred: foundry
  accepted:
    - foundry
    - hardhat
required_section_order:
  - Title
  - Summary
  - Vulnerability Detail
  - Impact
  - Code Snippet
  - Tool used
  - Recommendation
tiers:
  - id: high
    label: High
    rubric_verbatim: |
      Definite loss of funds without (extensive) limitations of external
      conditions. The loss of the affected party must exceed 1% if the
      avoidance from happening is dependent on the project team's response
      to the issue.
    payout_methodology: contest_pool_per_severity_breakdown
  - id: medium
    label: Medium
    rubric_verbatim: |
      Causes a loss of funds but requires certain external conditions or
      specific states, or there is a hypothetical attack path with stated
      assumptions, but external requirements.
    payout_methodology: contest_pool_per_severity_breakdown
  - id: low
    label: Low
    rubric_verbatim: |
      Issues that don't meet high or medium severity criteria. Generally
      informational, optimizations, or non-critical refactoring.
    payout_methodology: not_rewarded_by_default
sherlock_specific_rules:
  - "Issues with hypothetical attack paths and no concrete impact path are not valid."
  - "Future implementation issues are out of scope (e.g., the future plans of the project)."
  - "Issues whose impact only materializes in non-canonical chains are downgraded."
gates_required:
  - R17
  - R20
  - R24
  - R27
  - L30
  - L31
