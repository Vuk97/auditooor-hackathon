# Cantina platform severity rubric (canonical reference)
#
# Sources:
#   - https://docs.cantina.xyz/cantina-docs/cantina-competitions/judging-process/judging-guidelines
#   - https://cantina.xyz (per-competition page lists the exact rubric rows used)
#
# This file captures the GENERIC Cantina rubric. Per-competition rubrics may
# override or add rows; competitions referenced in workspace at:
#   ~/audits/<workspace>/SEVERITY.md
#
# Schema: auditooor.severity_rubric.v1
platform: cantina
schema_version: auditooor.severity_rubric.v1
source_docs:
  - "https://docs.cantina.xyz/cantina-docs/cantina-competitions/judging-process/judging-guidelines"
selector_modes:
  - listed-asset
  - primacy-of-impact   # only present on PoI-enabled Cantina engagements
poc_framing:
  preferred: foundry
  accepted:
    - foundry
    - hardhat
    - go-test-cosmos-sdk
required_section_order:
  - Title
  - Severity
  - Summary
  - Root Cause
  - Impact
  - Severity Justification
  - Override
  - Likelihood
  - Program Impact Mapping
  - Source-Only Justification
  - Real-Component Precondition
  - Production Path
  - Impact Contract
  - Scope And Originality
  - Proof of Concept
  - Recommended Fix
tiers:
  - id: critical
    label: Critical
    rubric_verbatim: |
      Direct theft of funds; permanent freezing of funds (fix requires hardfork);
      protocol insolvency.
    payout_range_usd: [10000, 250000]
  - id: high
    label: High
    rubric_verbatim: |
      Theft of unclaimed yield; permanent freezing of unclaimed yield;
      temporary freezing of funds for any amount of time greater than the
      maximum stipulated by the protocol.
    payout_range_usd: [5000, 50000]
  - id: medium
    label: Medium
    rubric_verbatim: |
      Smart contract unable to operate due to lack of token funds; block stuffing
      for profit; griefing (e.g. no profit motive for an attacker, but damage to
      the users or the protocol).
    payout_range_usd: [1000, 5000]
  - id: low
    label: Low
    rubric_verbatim: |
      Contract fails to deliver promised returns, but doesn't lose value.
    payout_range_usd: [100, 1000]
oos_traps:
  - centralization
  - privileged_role
  - frontend
  - off_chain
  - weird_token
gates_required:
  - R17
  - R18
  - R19
  - R20
  - R21
  - R22
  - R23
  - R24
  - R25
  - R26   # only fires on cosmos-sdk findings
  - R27
  - R30
  - L30
  - L31
  - L32
