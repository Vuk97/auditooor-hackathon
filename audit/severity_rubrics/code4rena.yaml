# Code4rena platform severity rubric (canonical reference)
#
# Sources:
#   - https://docs.code4rena.com/awarding/judging-criteria/severity-categorization
#   - https://docs.code4rena.com/competitions/
#
# Schema: auditooor.severity_rubric.v1
platform: code4rena
schema_version: auditooor.severity_rubric.v1
source_docs:
  - "https://docs.code4rena.com/awarding/judging-criteria/severity-categorization"
selector_modes:
  - contest-listed-asset
poc_framing:
  preferred: foundry
  accepted:
    - foundry
    - hardhat
required_section_order:
  - Title
  - Lines of code
  - Vulnerability details
  - Impact
  - Proof of Concept
  - Tools Used
  - Recommended Mitigation Steps
tiers:
  - id: high
    label: 3 (High Risk)
    rubric_verbatim: |
      Assets can be stolen / lost / compromised directly, or indirectly if a
      valid attack path is shown that does not have hand-wavy hypothetical
      preconditions. The protocol must be using the contract.
    payout_methodology: contest_pool_share
  - id: medium
    label: 2 (Medium Risk)
    rubric_verbatim: |
      Assets not at direct risk, but the function of the protocol or its
      availability could be impacted, or leak value with a hypothetical
      attack path with stated assumptions, but external requirements.
    payout_methodology: contest_pool_share
  - id: qa
    label: QA (Low / Non-Critical)
    rubric_verbatim: |
      Low risk and Non-critical findings consolidated into a single QA report
      per warden.
    payout_methodology: qa_report_pool
  - id: gas
    label: G (Gas Optimization)
    rubric_verbatim: |
      Gas optimization suggestions. Reported separately as a Gas report.
    payout_methodology: gas_report_pool
code4rena_specific_rules:
  - "Hypothetical attack paths with hand-wavy preconditions are downgraded."
  - "Privileged-role / centralization risk classified as QA by default."
  - "Direct-theft requires a valid attack path."
gates_required:
  - R17
  - R20
  - R24
  - R27
  - L30
  - L31
