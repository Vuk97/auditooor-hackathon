[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "auditooor-detectors"
# Version is regenerated by tools/build-detector-pack.py. Format: 0.1.YYYYMMDD
version = "0.2.20260504"
description = "Verified Tier-S/A/B custom Slither + Rust tree-sitter detectors from the auditooor security-research pipeline."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "auditooor", email = "noreply@auditooor.dev" },
]
keywords = ["slither", "solidity", "rust", "static-analysis", "audit", "security", "smart-contracts"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "slither-analyzer>=0.10.0",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/Vuk97/auditooor"
Issues = "https://github.com/Vuk97/auditooor/issues"

[project.scripts]
auditooor-detectors-list = "auditooor_detectors.list:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["auditooor_detectors*"]

[tool.setuptools.package-data]
"auditooor_detectors" = [
    "registry.json",
    "detectors/**/*.py",
]
