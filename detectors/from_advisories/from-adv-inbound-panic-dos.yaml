pattern: from-adv-inbound-panic-dos
source: advisory-seed-corpus/inbound_panic_dos
severity: HIGH
confidence: MEDIUM
backend: regex
tags: [panic-dos]

# CLASS-LEVEL mechanism detector auto-derived from 5 advisory seed(s).
# Mechanism matched, not any instance. Anti-overfit verified by advisory-seed-to-dsl.py.
# advisory: https://github.com/ZcashFoundation/zebra/security/advisories/GHSA-29x4-r6jv-ff4w
# advisory: https://github.com/ZcashFoundation/zebra/security/advisories/GHSA-452v-w3gx-72wg
# advisory: https://github.com/ZcashFoundation/zebra/security/advisories/GHSA-c8w6-x74f-vmg3
# advisory: https://github.com/ZcashFoundation/zebra/security/advisories/GHSA-qp6f-w4r3-h8wg
# advisory: https://github.com/ZcashFoundation/zebra/security/advisories/GHSA-qv2r-v3mx-f4pf

preconditions: []

match:
  - function.kind: external_or_public
  - function.name_matches: "(?i)(handle_|on_message|on_request|recv|receive|decode|deserialize|from_bytes|read_body|rpc_|inbound|dispatch)"
  - function.body_contains_regex: "(?:\\.(?:expect|unwrap|unwrap_unchecked)\\s*\\(|\\bunreachable!\\s*\\(|\\bpanic!\\s*\\(|\\[\\s*\\d+\\s*\\.\\.\\s*\\d+\\s*\\]|\\.coordinates\\s*\\(\\s*\\)\\s*\\.\\s*unwrap)"
  - function.body_not_contains_regex: "(?:\\bok_or\\b|\\bok_or_else\\b|\\.get\\s*\\(|\\bchecked_|\\bmatches!\\b|->\\s*Result<|\\?;)"

help: "Authenticated/crafted inbound message handler uses a panic-capable op (unwrap/expect/slice-index) on attacker-controlled data without fallible handling - one crafted message aborts the node (panic-abort DoS)."
wiki_title: "Inbound Panic Dos"
wiki_description: "Authenticated/crafted inbound message handler uses a panic-capable op (unwrap/expect/slice-index) on attacker-controlled data without fallible handling - one crafted message aborts the node (panic-abort DoS)."
