id: batch-price-lacks-asset-binding
title: "Batch price response lacks per-asset binding, allowing cross-asset substitution"
severity: High
language: rust
platform: soroban
source: "k2-v12"
source_ids:
  - "44426"
bug_class: oracle-cascade
indicators:
  - "batch response indexed positionally without embedded asset id"
  - "caller trusts `responses[i]` corresponds to `assets[i]` without verifying"
  - "no `response.asset == requested.asset` assertion in the caller"
victim: "Users: misaligned responses produce wildly wrong prices for assets in the batch."
exploit_precondition: "Malicious or buggy oracle reorders responses."
real_world_example: |
  V12 #44426 (High, V12-self-invalidated): Batch prices lack asset binding.
suggested_remediation: "Include asset id in every response and verify on the caller side."
cross_refs:
