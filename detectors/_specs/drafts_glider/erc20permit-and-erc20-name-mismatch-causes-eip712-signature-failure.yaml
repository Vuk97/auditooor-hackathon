wiki_title: "ERC20Permit and ERC20 name mismatch breaks EIP-712 permit signatures"
wiki_description: |
    ERC20Permit builds its EIP-712 domain from the permit constructor name. If a token initializes `ERC20` with one name and `ERC20Permit` with a different one, integrations that trust the ERC20-visible token name will generate signatures for the wrong domain and on-chain `permit` calls will fail.
wiki_exploit_scenario: |
    A token is deployed as `ERC20("Mismatch Token", "MMT")` but `ERC20Permit("Permit Token")`. Wallets derive the permit domain from the token name users see, sign for `Mismatch Token`, and every on-chain permit verification hashes `Permit Token` instead, causing signature failure.
wiki_recommendation: "Pass the same token name to both base constructors, ideally from the same constructor parameter."
detection_approach: |
    Inspect each non-vendored contract constructor source for both `ERC20(...)` and `ERC20Permit(...)` base-constructor invocations. When both first-name operands are string literals and the literals differ, flag the contract.
known_limitations: |
    This repair is a fixture-smoke approximation only. It does not resolve forwarded identifiers, constants, inherited wrappers, or proxy initializer flows, so the row should remain `NOT_SUBMIT_READY`.
