wiki_title: "EIP-712 Signature Replay Across Different Domains"
wiki_description: |
    Hand-repaired graveyard approximation for permit/delegate-style signature
    verifiers that hash a typehash-based struct and recover a signer without
    any visible EIP-712 domain-binding marker such as DOMAIN_SEPARATOR,
    _hashTypedDataV4, toTypedDataHash, block.chainid, or address(this).
wiki_exploit_scenario: |
    A user signs a permit for protocol A. Protocol B verifies the same typed
    struct with ecrecover but never mixes its domain separator into the digest.
    The same signature therefore authenticates on protocol B as well.
wiki_recommendation: "Build the final digest with the verifier's own EIP-712 domain separator via _hashTypedDataV4 or ECDSA.toTypedDataHash, and bind the domain to block.chainid and address(this)."
detector_strategy: |
    Source-scan declared public/external functions. Require:
      - signature-oriented function name (permit/delegate/meta/authorize/bysig)
      - ecrecover or recover(...)
      - keccak256(...)
      - TYPEHASH-like token
    Flag only when the function body lacks domain-binding markers such as
    DOMAIN_SEPARATOR, domainSeparator, _hashTypedDataV4, toTypedDataHash,
    block.chainid, or address(this).
