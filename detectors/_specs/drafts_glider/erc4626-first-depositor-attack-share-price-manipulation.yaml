wiki_title: "ERC4626 First Depositor Attack - Share Price Manipulation"
wiki_description: |
    Detects ERC4626-style deposit or mint flows that read total-supply or total-asset
    accounting but do not call a bootstrap helper, virtual-offset helper, or
    first-deposit guard.
wiki_exploit_scenario: |
    Attacker seeds an empty vault, donates underlying to skew the exchange rate,
    then frontruns the next depositor so the victim receives near-zero shares.
wiki_recommendation: "Use a bootstrap branch, virtual shares/assets, or an equivalent first-deposit guard to prevent hostile exchange-rate initialization."
