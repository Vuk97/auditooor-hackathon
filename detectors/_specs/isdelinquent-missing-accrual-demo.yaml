wiki_title: "Debt health check missing interest accrual"
wiki_description: "A function whose name suggests a debt-health check reads loan amount state without first calling an accrual helper, producing a stale picture of the borrower's health."
wiki_exploit_scenario: "Alice's loan accrues interest over time. The protocol's _isHealthyDemo helper reads loan.amount without accruing first, so it sees the un-accrued principal and reports Alice as healthy. Once a dust repay triggers accrual, Alice instantly becomes bad-debt."
wiki_recommendation: "Call _accrueInterestDemo(loanId) at the top of any *isHealthy*/*isDelinquent* / health-check helper, so the reads see the up-to-date amount."

fn_name_regex: ".*(isDelinquentDemo|isHealthyDemo|isLiquidatableDemo).*"
