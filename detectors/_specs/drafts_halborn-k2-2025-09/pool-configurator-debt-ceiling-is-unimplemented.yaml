id: pool-configurator-debt-ceiling-is-unimplemented
title: |
  POOL CONFIGURATOR DEBT CEILING IS UNIMPLEMENTED
severity: Low
language: rust
platform: soroban
source: halborn-k2-2025-09
source_id: "7.27"
bug_class: miscellaneous
indicators:
  - 'text-pattern: pool configurator debt ceiling is unimplemented'
victim: tbd
exploit_precondition: tbd
real_world_example: |
  // LOW Description The configurator exposes set_debt_ceiling , but the packed ReserveConfiguration lacks a debt-ceiling field: get_debt_ceiling always returns 0 and no setter is present. The entrypoint emits an event and rewrites the unchanged configuration, so any supplied debt ceiling is discarded and never enforced or queryable. Consequently, governance may be led to believe that ceilings have been set while the effective risk limits remain unchanged.
suggested_remediation: |
  See source report 7.27 (halborn-k2-2025-09).
