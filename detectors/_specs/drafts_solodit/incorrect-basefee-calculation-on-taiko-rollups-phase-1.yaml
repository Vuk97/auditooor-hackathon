wiki_description: |
    On a Taiko rollup, the basefee at block `n` is computed as `b(n) = b0 * 1/TA * exp(gas_excess / TA)`, where `b0 = 1`, `T` the gas target is `60` million gas and `A` is the adjustment factor set to `8`. This formula is [explained](https://github.com/taikoxyz/taiko-mono/blob/b47fc34cb0e7fe9b7ebd9416b3
