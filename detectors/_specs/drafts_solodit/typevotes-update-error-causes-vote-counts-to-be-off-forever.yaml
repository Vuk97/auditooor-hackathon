    ## Description
    In `changeGaugeWeight`, `typeWeights[gaugeType][nextTimestamp] = newSum;` is assigned. However, `typeWeights` is a coefficient that is multiplied by vote, and it is `typeVotes` to which `newSum` should be assigned instead.
    
