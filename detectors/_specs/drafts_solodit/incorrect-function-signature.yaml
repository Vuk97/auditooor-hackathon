wiki_description: |
    ## Deposit Issue in depositETHFor Function
    
    The `depositETHFor` function fails unconditionally due to an incorrect utilization of `IWETH.deposit`. The signature of `IWETH.deposit` should be `deposit() external payable`. However, the signature `deposit(uint256) external payable` is used instead.
    
