wiki_description: |
    #### Resolution
    
    
    
    Fixed in [PR16](https://github.com/MetaMask/delegation-framework/pull/16).
    
    
    `ArgsEqualityCheckEnforcer` enforcer terms contain the delegation hash and the redeemer. This prevents an external actor from front\-running the payment when executing a delegation.
    
    
    
    
