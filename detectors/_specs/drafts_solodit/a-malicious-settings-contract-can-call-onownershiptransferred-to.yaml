wiki_description: |
    ## Vulnerability Report
    
    ## Severity
    **Medium Risk**
    
    ## Context
    `StandardSettings.sol#L118-L158`
    
    ## Description
    The function `onOwnershipTransferred()` can be called from a pair via `call()`. This can be done either before `transferOwnership()` or after it. 
    
    - If it is called **before** `transferOwnership()`, the settings contract can take over the pair.
wiki_exploit_scenario: |
    A malicious settings contract calls `onOwnershipTransferred()` before the pair completes ownership transfer and takes over the pair.
wiki_recommendation: "See source audit report for recommended fix."
